blueprint:
  name: ESPHome Auto Bulk Update with Telegram Confirmation
  description: "Erweitertes Original-Blueprint: Führt Updates für ESPHome-Geräte sequentiell aus, fragt aber vorher via Telegram um Erlaubnis."
  domain: automation
  input:
    # --- ORIGINAL INPUTS ---
    esphome_update_entities:
      name: ESPHome Update Entities
      description: Die Update-Entitäten der ESPHome Geräte.
      selector:
        entity:
          filter:
            - integration: esphome
              domain: update
          multiple: true
    automation_trigger:
      name: Automation Trigger
      description: Wann soll die Suche nach Updates starten?
      default:
        - platform: time
          at: "04:00:00"
      selector:
        trigger: {}
    exclude_devices:
      name: Exclude Devices
      description: "Gerätenamen (oder Teile davon), die ignoriert werden sollen (kommagetrennt)."
      default: ""
      selector:
        text:
    wait_time_between_updates:
      name: Wait time between updates
      description: Zeitpuffer zwischen den einzelnen Updates.
      default: 30
      selector:
        number:
          min: 0
          max: 600
          unit_of_measurement: seconds
    update_timeout:
      name: Update Timeout
      description: Max. Zeit, die ein einzelnes Gerät zum Updaten hat.
      default: 300
      selector:
        number:
          min: 60
          max: 3600
          unit_of_measurement: seconds

    # --- NEUE TELEGRAM INPUTS ---
    telegram_chat_id:
      name: Telegram Chat ID
      description: "Die numerische Chat-ID für die Benachrichtigung."
      selector:
        text: # Ein dynamisches Dropdown für Telegram-Chats existiert in HA leider nicht nativ, Text ist hier der sicherste Weg.
    telegram_bot_service:
      name: Telegram Bot Service
      description: Der zu verwendende Dienst (meist telegram_bot.send_message).
      default: telegram_bot.send_message
      selector:
        text:
    wait_confirmation_timeout:
      name: Bestätigungs-Timeout
      description: Wie lange soll auf dein 'OK' gewartet werden, bevor das Update heute abgebrochen wird?
      default: 120
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: minutes

mode: restart

trigger: !input automation_trigger

action:
  # 1. Prüfen, ob überhaupt Updates da sind (Original-Logik vorab simuliert)
  - variables:
      entities: !input esphome_update_entities
      exclude_list: !input exclude_devices
      # Filtert die Liste nach 'on' und schließt die Exclude-Liste aus
      update_list: >
        {% set excludes = exclude_list.split(',') | map('trim') | list %}
        {% set filtered = entities | select('is_state', 'on') | list %}
        {% set final = namespace(items=[]) %}
        {% for item in filtered %}
          {% set name = state_attr(item, 'friendly_name') %}
          {% set excluded = namespace(found=false) %}
          {% for ex in excludes if ex != "" %}
            {% if ex.lower() in name.lower() %}
              {% set excluded.found = true %}
            {% endif %}
          {% endfor %}
          {% if not excluded.found %}
            {% set final.items = final.items + [item] %}
          {% endif %}
        {% endfor %}
        {{ final.items }}

  # Nur fortfahren, wenn die Liste nicht leer ist
  - condition: template
    value_template: "{{ update_list | count > 0 }}"

  # 2. Telegram Nachricht senden
  - service: !input telegram_bot_service
    data:
      target: !input telegram_chat_id
      title: "🛠️ *ESPHome Updates verfügbar*"
      message: >
        Es sind Updates für {{ update_list | count }} Geräte bereit. 
        Soll ich mit der Installation beginnen?
      inline_keyboard:
        - "Update starten:/esphome_start, Abbrechen:/esphome_stop"

  # 3. Auf Antwort warten
  - wait_for_trigger:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/esphome_start"
          chat_id: !input telegram_chat_id
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/esphome_stop"
          chat_id: !input telegram_chat_id
    timeout:
      minutes: !input wait_confirmation_timeout
    continue_on_timeout: false

  # 4. Falls Start geklickt wurde: Original Bulk-Update Logik ausführen
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.data == '/esphome_start' }}"
        sequence:
          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "✅ Update-Vorgang wird ausgeführt..."

          # --- BEGINN DER ORIGINALEN SCHLEIFEN-LOGIK ---
          - repeat:
              for_each: "{{ update_list }}"
              sequence:
                - service: update.install
                  target:
                    entity_id: "{{ repeat.item }}"
                - wait_for_trigger:
                    - platform: state
                      entity_id: "{{ repeat.item }}"
                      to: "off"
                  timeout: !input update_timeout
                - delay: !input wait_time_between_updates
          # --- ENDE DER ORIGINALEN SCHLEIFEN-LOGIK ---

          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "🏁 Alle Updates abgeschlossen."

      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.data == '/esphome_stop' }}"
        sequence:
          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "❌ Update manuell abgebrochen."