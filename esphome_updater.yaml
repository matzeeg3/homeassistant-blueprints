blueprint:
  name: ESPHome Device Auto Bulk Update (Telegram Only)
  description: |
    Automatically updates ESPHome devices when a specified number of them
    have pending updates. Notifications and controls are sent via Telegram.

    DEVICE FIRMWARE ENTITIES MUST BE ENABLED
  domain: automation
  input:
    update_threshold:
      name: Device Update Threshold
      description: How many devices need a pending update before updates are pushed.
      default: 1
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: slider
    update_delay:
      name: Delay Before Updating
      description: How many minutes to wait before pushing updates.
      default: 30
      selector:
        number:
          min: 0
          max: 60
          step: 1
          mode: slider
          unit_of_measurement: minutes
    cooldown:
      name: Cooldown After Update
      description: Minutes to wait after updates complete before the automation can trigger again.
      default: 60
      selector:
        number:
          min: 1
          max: 120
          step: 1
          mode: slider
          unit_of_measurement: minutes
    time_window_start:
      name: Update Window Start
      description: Earliest time of day updates can be triggered.
      default: "08:00:00"
      selector:
        time:
    time_window_end:
      name: Update Window End
      description: Latest time of day updates can be triggered.
      default: "21:00:00"
      selector:
        time:
    telegram_chat_id:
      name: Telegram Chat ID
      description: The Chat ID to receive notifications and send commands.
      selector:
        text:
    update_mode:
      name: Update Mode
      description: Update all devices at once or one at a time sequentially.
      default: "all_at_once"
      selector:
        select:
          options:
            - label: "All at once"
              value: "all_at_once"
            - label: "One at a time (Sequential)"
              value: "sequential"
    sequential_delay:
      name: Delay Between Sequential Updates
      description: Minutes to wait between each device when using sequential mode.
      default: 5
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider
          unit_of_measurement: minutes

variables:
  update_threshold: !input update_threshold
  update_delay: !input update_delay
  cooldown: !input cooldown
  update_mode: !input update_mode
  sequential_delay: !input sequential_delay
  telegram_chat: !input telegram_chat_id
  device_list: >
    {{ expand(integration_entities('esphome'))
        | selectattr("entity_id", "contains", "update")
        | selectattr("state", "eq", "on")
        | map(attribute='entity_id') | list }}
  device_names: >
    {{ expand(integration_entities('esphome'))
        | selectattr("entity_id", "contains", "update")
        | selectattr("state", "eq", "on")
        | map(attribute='name') | join(', ') }}
  device_count: >
    {{ expand(integration_entities('esphome'))
        | selectattr("entity_id", "contains", "update")
        | selectattr("state", "eq", "on")
        | list | count }}

trigger:
  - platform: template
    value_template: >
      {{ expand(integration_entities('esphome'))
          | selectattr("entity_id", "contains", "update")
          | selectattr("state", "eq", "on")
          | list | count > 0 }}
  - platform: time
    at: !input time_window_start

condition:
  - condition: time
    after: !input time_window_start
    before: !input time_window_end
  - condition: template
    value_template: >
      {{ expand(integration_entities('esphome'))
          | selectattr("entity_id", "contains", "update")
          | selectattr("state", "eq", "on")
          | list | count >= update_threshold }}

action:
  # Sende Ankündigung via Telegram
  - action: telegram_bot.send_message
    data:
      target: "{{ telegram_chat }}"
      title: "*ESPHome Update verfügbar*"
      message: >
        {{ device_count }} Gerät(e) benötigen ein Update: {{ device_names }}.
        Updates starten automatisch in {{ update_delay }} Minute(n).
      data:
        inline_keyboard:
          - "Jetzt aktualisieren:/UPDATE_NOW_ESPHOME"
          - "Abbrechen:/CANCEL_ESPHOME_UPDATE"

  # Warte auf Klick oder Zeitablauf
  - wait_for_trigger:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/CANCEL_ESPHOME_UPDATE"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/UPDATE_NOW_ESPHOME"
    timeout:
      minutes: "{{ update_delay }}"
    continue_on_timeout: true

  # Entscheidung logik
  - if:
      - condition: template
        value_template: >
          {{ wait.trigger is not none and wait.trigger.event.data.data == '/CANCEL_ESPHOME_UPDATE' }}
    then:
      - action: telegram_bot.send_message
        data:
          target: "{{ telegram_chat }}"
          message: "❌ Update-Vorgang wurde abgebrochen."
    else:
      - if:
          - condition: template
            value_template: "{{ update_mode == 'sequential' }}"
        then:
          - repeat:
              for_each: "{{ device_list }}"
              sequence:
                - action: update.install
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay:
                    minutes: "{{ 0 if repeat.last else sequential_delay }}"
        else:
          - action: update.install
            continue_on_error: true
            target:
              entity_id: "{{ device_list }}"

      - action: telegram_bot.send_message
        data:
          target: "{{ telegram_chat }}"
          message: "✅ Update abgeschlossen: {{ device_count }} Gerät(e) aktualisiert ({{ device_names }})."

      - delay:
          minutes: "{{ cooldown }}"

mode: single