blueprint:
  name: ESPHome Auto Bulk Update + Telegram Control
  description: "Basiert auf matzeeg3's Blueprint. Erweitert um Telegram-Abfrage und vollständige Prozesskontrolle."
  domain: automation
  input:
    # --- ORIGINAL REPO INPUTS ---
    esphome_update_entities:
      name: ESPHome Update Entities
      description: Die Update-Entitäten (z.B. update.esp_firmware).
      selector:
        entity:
          filter:
            - integration: esphome
              domain: update
          multiple: true
    exclude_devices:
      name: Exclude Devices
      description: "Teile des Namens von Geräten, die ignoriert werden sollen (kommagetrennt, z.B. 'test, beta')."
      default: ""
      selector:
        text:
    automation_trigger:
      name: Automation Trigger
      description: Wann soll die Prüfung starten?
      default:
        - platform: time
          at: "04:00:00"
      selector:
        trigger: {}
    pre_update_action:
      name: Pre-update Action
      description: Aktionen, die VOR dem ersten Update ausgeführt werden (z.B. Backup).
      default: []
      selector:
        action: {}
    post_update_action:
      name: Post-update Action
      description: Aktionen, die NACH allen Updates ausgeführt werden.
      default: []
      selector:
        action: {}
    wait_time_between_updates:
      name: Wait time between updates
      description: Pause zwischen den Geräten.
      default: 30
      selector:
        number:
          min: 0
          max: 600
          unit_of_measurement: seconds
    update_timeout:
      name: Update Timeout
      description: Zeit, nach der ein einzelnes Update als 'fehlgeschlagen' gewertet wird.
      default: 300
      selector:
        number:
          min: 60
          max: 3600
          unit_of_measurement: seconds

    # --- TELEGRAM INPUTS ---
    telegram_chat_id:
      name: Telegram Chat ID / Target
      description: "Die ID deines Telegram Chats (z.B. 12345678). Findest du über den 'getUpdates' Call oder einen Echo-Bot."
      selector:
        text:
    telegram_bot_service:
      name: Telegram Bot Service
      description: Welcher Dienst soll genutzt werden?
      default: telegram_bot.send_message
      selector:
        text:
    wait_confirmation_timeout:
      name: Bestätigungs-Timeout (Minuten)
      description: "Wenn du innerhalb dieser Zeit nicht antwortest, wird der Vorgang sicherheitshalber abgebrochen."
      default: 120
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: minutes

mode: restart

variables:
  # Liste bereinigen (Exclude-Logik aus dem Original übernommen)
  entities: !input esphome_update_entities
  exclude_list: !input exclude_devices
  update_list: >
    {% set excludes = exclude_list.split(',') | map('trim') | list %}
    {% set filtered = entities | select('is_state', 'on') | list %}
    {% set final = namespace(items=[]) %}
    {% for item in filtered %}
      {% set name = state_attr(item, 'friendly_name') or 'Unknown' %}
      {% set excluded = namespace(found=false) %}
      {% for ex in excludes if ex != "" %}
        {% if ex.lower() in name.lower() %}
          {% set excluded.found = true %}
        {% endif %}
      {% endfor %}
      {% if not excluded.found %}
        {% set final.items = final.items + [item] %}
      {% endif %}
    {% endfor %}
    {{ final.items }}

trigger: !input automation_trigger

action:
  # Nur fortfahren, wenn wirklich Updates anstehen
  - condition: template
    value_template: "{{ update_list | count > 0 }}"

  # 1. Telegram Anfrage senden
  - service: !input telegram_bot_service
    data:
      target: !input telegram_chat_id
      title: "🚀 *ESPHome Update Check*"
      message: >
        Es sind Updates für {{ update_list | count }} Geräte verfügbar:
        {% for item in update_list -%}
          - {{ state_attr(item, 'friendly_name') }}
        {% endfor %}
        Soll der Bulk-Update-Prozess gestartet werden?
      inline_keyboard:
        - "Update starten:/esphome_start, Abbrechen:/esphome_stop"

  # 2. Auf Interaktion warten
  - wait_for_trigger:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/esphome_start"
          chat_id: !input telegram_chat_id
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/esphome_stop"
          chat_id: !input telegram_chat_id
    timeout:
      minutes: !input wait_confirmation_timeout
    continue_on_timeout: false

  # 3. Entscheidung verarbeiten
  - choose:
      # FALL: START
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.data == '/esphome_start' }}"
        sequence:
          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "⏳ Pre-Update Aktionen werden ausgeführt..."

          # PRE-UPDATE ACTIONS (Original)
          - choose: []
            default: !input pre_update_action

          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "✅ Installation beginnt..."

          # DER BULK LOOP (Original Logik)
          - repeat:
              for_each: "{{ update_list }}"
              sequence:
                - service: update.install
                  target:
                    entity_id: "{{ repeat.item }}"
                # Warten bis Entität auf 'off' geht oder Timeout
                - wait_for_trigger:
                    - platform: state
                      entity_id: "{{ repeat.item }}"
                      to: "off"
                  timeout: !input update_timeout
                
                # Feedback pro Gerät (Optional, aber für Rock Solid gut)
                - condition: template
                  value_template: "{{ repeat.index < update_list | count }}"
                - delay: !input wait_time_between_updates

          # POST-UPDATE ACTIONS (Original)
          - choose: []
            default: !input post_update_action

          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "🏁 Alle Updates wurden verarbeitet."

      # FALL: STOP
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.data == '/esphome_stop' }}"
        sequence:
          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "❌ Update durch Nutzer abgebrochen."