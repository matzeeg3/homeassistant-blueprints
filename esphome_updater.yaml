blueprint:
  name: ESPHome Device Auto Bulk Update (with Telegram)
  description: |
    Automatically updates ESPHome devices with support for Companion App and Telegram notifications.
    DEVICE FIRMWARE ENTITIES MUST BE ENABLED.
  domain: automation
  source_url: https://github.com/bferd/homeassistant-blueprints/blob/main/esphome_auto_bulk_update.yaml
  input:
    update_threshold:
      name: Device Update Threshold
      default: 1
      selector:
        number:
          min: 1
          max: 20
          mode: slider
    update_delay:
      name: Delay Before Updating
      default: 30
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
    cooldown:
      name: Cooldown After Update
      default: 60
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: minutes
    time_window_start:
      name: Update Window Start
      default: "08:00:00"
      selector:
        time:
    time_window_end:
      name: Update Window End
      default: "21:00:00"
      selector:
        time:
    notify_device:
      name: Companion App Device
      description: "Device for Home Assistant Companion App notifications."
      selector:
        device:
          integration: mobile_app
    telegram_chat_id:
      name: Telegram Chat ID (Optional)
      description: "Optional: Enter Chat ID to receive notifications via Telegram."
      default: ""
    update_mode:
      name: Update Mode
      default: "all_at_once"
      selector:
        select:
          options:
            - label: "All at once"
              value: "all_at_once"
            - label: "One at a time (Sequential)"
              value: "sequential"
    sequential_delay:
      name: Delay Between Sequential Updates
      default: 5
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: minutes

variables:
  update_threshold: !input update_threshold
  update_delay: !input update_delay
  cooldown: !input cooldown
  update_mode: !input update_mode
  sequential_delay: !input sequential_delay
  telegram_chat: !input telegram_chat_id
  device_list: >
    {{ expand(integration_entities('esphome'))
        | selectattr("entity_id", "contains", "update")
        | selectattr("state", "eq", "on")
        | map(attribute='entity_id') | list }}
  device_names: >
    {{ expand(integration_entities('esphome'))
        | selectattr("entity_id", "contains", "update")
        | selectattr("state", "eq", "on")
        | map(attribute='name') | join(', ') }}
  device_count: >
    {{ expand(integration_entities('esphome'))
        | selectattr("entity_id", "contains", "update")
        | selectattr("state", "eq", "on")
        | list | count }}

trigger:
  - platform: template
    value_template: >
      {{ expand(integration_entities('esphome'))
          | selectattr("entity_id", "contains", "update")
          | selectattr("state", "eq", "on")
          | list | count > 0 }}
  - platform: time
    at: !input time_window_start

condition:
  - condition: time
    after: !input time_window_start
    before: !input time_window_end
  - condition: template
    value_template: >
      {{ expand(integration_entities('esphome'))
          | selectattr("entity_id", "contains", "update")
          | selectattr("state", "eq", "on")
          | list | count >= update_threshold }}

action:
  # 1. NOTIFICATION BLOCK (Companion App)
  - continue_on_error: true
    domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: "ESPHome Device Update(s)"
    message: "{{ device_count }} device(s) need updating: {{ device_names }}. Updates in {{ update_delay }} min."
    data:
      actions:
        - action: "UPDATE_NOW_ESPHOME"
          title: "Update Now"
        - action: "CANCEL_ESPHOME_UPDATE"
          title: "Cancel"

  # 2. NOTIFICATION BLOCK (Telegram)
  - if:
      - condition: template
        value_template: "{{ telegram_chat != '' }}"
    then:
      - action: telegram_bot.send_message
        data:
          target: "{{ telegram_chat }}"
          title: "*ESPHome Update*"
          message: "{{ device_count }} device(s) need updating: {{ device_names }}. Updates in {{ update_delay }} min."
          data:
            inline_keyboard:
              - "Update Now:/UPDATE_NOW_ESPHOME, Cancel:/CANCEL_ESPHOME_UPDATE"

  # 3. WAIT FOR RESPONSE
  - wait_for_trigger:
      - platform: event
        event_type: 
          - mobile_app_notification_action
          - telegram_callback
        event_data:
          action: "CANCEL_ESPHOME_UPDATE"
      - platform: event
        event_type: 
          - mobile_app_notification_action
          - telegram_callback
        event_data:
          action: "UPDATE_NOW_ESPHOME"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/CANCEL_ESPHOME_UPDATE"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/UPDATE_NOW_ESPHOME"
    timeout:
      minutes: "{{ update_delay }}"
    continue_on_timeout: true

  # 4. EVALUATE RESPONSE
  - if:
      - condition: template
        value_template: >
          {% set action = wait.trigger.event.data.action if wait.trigger and wait.trigger.event.data.action is defined else '' %}
          {% set data = wait.trigger.event.data.data if wait.trigger and wait.trigger.event.data.data is defined else '' %}
          {{ action == 'CANCEL_ESPHOME_UPDATE' or data == '/CANCEL_ESPHOME_UPDATE' }}
    then:
      # Cancellation Notifications
      - action: notify.mobile_app_{{ (device_entities(notify_device) | select('search', 'notify') | list | first).split('.')[-1] }}
        data:
          title: "Cancelled"
          message: "ESPHome updates stopped."
      - if:
          - condition: template
            value_template: "{{ telegram_chat != '' }}"
        then:
          - action: telegram_bot.send_message
            data:
              target: "{{ telegram_chat }}"
              message: "❌ Update cancelled."
    else:
      # PROCEED WITH UPDATES
      - if:
          - condition: template
            value_template: "{{ update_mode == 'sequential' }}"
        then:
          - repeat:
              for_each: "{{ device_list }}"
              sequence:
                - action: update.install
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay:
                    minutes: "{{ 0 if repeat.last else sequential_delay }}"
        else:
          - action: update.install
            continue_on_error: true
            target:
              entity_id: "{{ device_list }}"

      # Final Success Notifications
      - continue_on_error: true
        domain: mobile_app
        type: notify
        device_id: !input notify_device
        title: "ESPHome Updates Complete"
        message: "{{ device_count }} device(s) updated."
      
      - if:
          - condition: template
            value_template: "{{ telegram_chat != '' }}"
        then:
          - action: telegram_bot.send_message
            data:
              target: "{{ telegram_chat }}"
              message: "✅ {{ device_count }} ESPHome device(s) updated."

      - delay:
          minutes: "{{ cooldown }}"

mode: single