blueprint:
  name: ESPHome Auto Bulk Update + Telegram Interaction
  description: >
    Vollständige Version des matzeeg3-Blueprints, erweitert um eine interaktive Telegram-Abfrage.
    Das Update startet erst, wenn du im Telegram-Chat auf 'Start' drückst.
  domain: automation
  input:
    # --- ORIGINAL INPUTS ---
    esphome_update_entities:
      name: ESPHome Update Entities
      description: Entities to update.
      selector:
        entity:
          filter:
            - integration: esphome
              domain: update
          multiple: true
    exclude_devices:
      name: Exclude Devices
      description: "Devices to exclude from the update (comma-separated). Example: 'test, beta'"
      default: ""
      selector:
        text:
    automation_trigger:
      name: Automation Trigger
      description: Trigger for the automation.
      default:
        - platform: time
          at: "04:00:00"
      selector:
        trigger: {}
    pre_update_action:
      name: Pre-update Action
      description: Action to perform before the first update.
      default: []
      selector:
        action: {}
    post_update_action:
      name: Post-update Action
      description: Action to perform after the last update.
      default: []
      selector:
        action: {}
    wait_time_between_updates:
      name: Wait time between updates
      description: Time to wait between each update.
      default: 30
      selector:
        number:
          min: 0
          max: 600
          unit_of_measurement: seconds
    update_timeout:
      name: Update Timeout
      description: Timeout for each update.
      default: 300
      selector:
        number:
          min: 60
          max: 3600
          unit_of_measurement: seconds

    # --- TELEGRAM INPUTS (Erweiterung) ---
    telegram_chat_id:
      name: Telegram Chat ID
      description: "Die ID deines Telegram-Chats. (Hinweis: Ein echtes Dropdown für Chat-IDs wird von Home Assistant für Blueprints leider nicht unterstützt, daher hier die ID eintragen)."
      selector:
        text:
    telegram_bot_service:
      name: Telegram Bot Service
      description: Der Dienst zum Senden (meist telegram_bot.send_message).
      default: telegram_bot.send_message
      selector:
        text:
    confirmation_timeout:
      name: Wartezeit auf Bestätigung
      description: Minuten, die auf deine Antwort gewartet wird, bevor die Automatisierung abbricht.
      default: 60
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: minutes

mode: restart

# --- ORIGINAL VARIABLEN LOGIK (unverändert) ---
variables:
  entities: !input esphome_update_entities
  exclude_list: !input exclude_devices
  update_list: >
    {% set excludes = exclude_list.split(',') | map('trim') | list %}
    {% set filtered = entities | select('is_state', 'on') | list %}
    {% set final = namespace(items=[]) %}
    {% for item in filtered %}
      {% set name = state_attr(item, 'friendly_name') %}
      {% set excluded = namespace(found=false) %}
      {% for ex in excludes if ex != "" %}
        {% if ex.lower() in name.lower() %}
          {% set excluded.found = true %}
        {% endif %}
      {% endfor %}
      {% if not excluded.found %}
        {% set final.items = final.items + [item] %}
      {% endif %}
    {% endfor %}
    {{ final.items }}

trigger: !input automation_trigger

action:
  # 1. Check ob Updates da sind (Original Logik)
  - condition: template
    value_template: "{{ update_list | count > 0 }}"

  # 2. Telegram Interaktion (Eingeschobener Block)
  - service: !input telegram_bot_service
    data:
      target: !input telegram_chat_id
      title: "🤖 *ESPHome Update verfügbar*"
      message: >
        Es stehen Updates für {{ update_list | count }} Geräte an.
        Soll ich mit der Installation beginnen?
      inline_keyboard:
        - "✅ Starten:/esphome_start, ❌ Abbrechen:/esphome_stop"

  - wait_for_trigger:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/esphome_start"
          chat_id: !input telegram_chat_id
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/esphome_stop"
          chat_id: !input telegram_chat_id
    timeout:
      minutes: !input confirmation_timeout
    continue_on_timeout: false

  # 3. Prozesssteuerung basierend auf Antwort
  - choose:
      # FALL: START - Hier folgt die KOMPLETTE ORIGINAL-LOGIK
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.data == '/esphome_start' }}"
        sequence:
          # --- AB HIER: ORIGINAL REPO LOGIK ---
          - choose: []
            default: !input pre_update_action

          - repeat:
              for_each: "{{ update_list }}"
              sequence:
                - service: update.install
                  target:
                    entity_id: "{{ repeat.item }}"
                - wait_for_trigger:
                    - platform: state
                      entity_id: "{{ repeat.item }}"
                      to: "off"
                  timeout: !input update_timeout
                - condition: template
                  value_template: "{{ repeat.index < update_list | count }}"
                - delay: !input wait_time_between_updates

          - choose: []
            default: !input post_update_action
          # --- ENDE ORIGINAL REPO LOGIK ---

          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "🏁 Alle ESPHome-Geräte wurden aktualisiert."

      # FALL: ABBRUCH
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger.event.data.data == '/esphome_stop' }}"
        sequence:
          - service: !input telegram_bot_service
            data:
              target: !input telegram_chat_id
              message: "❌ Update-Prozess wurde vom Nutzer abgebrochen."